<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditix - Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e2e8f0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 1;
            position: relative;
        }

        /* Logo */
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 48px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            color: #3b82f6;
            animation: pulse-icon 2s ease-in-out infinite;
        }

        .logo-text {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #f1f5f9;
        }

        /* Spinner */
        .spinner-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid #1e293b;
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
        }

        /* Text */
        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.6;
            max-width: 420px;
            margin: 0 auto;
        }

        .dot-animation::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        /* Subtle background glow */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: glow-pulse 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-icon {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes dots {
            0%   { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
            100% { content: ''; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <div class="logo">
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
                <path d="m9 12 2 2 4-4"/>
            </svg>
            <span class="logo-text">Auditix</span>
        </div>

        <div class="spinner-wrapper">
            <div class="spinner"></div>
        </div>

        <h1>Mise a jour en cours</h1>
        <p class="dot-animation">Le serveur redemarre, cette page se rechargera automatiquement</p>
    </div>

    <script>
        // Auto-refresh: try to reach the server every 3 seconds
        setInterval(function() {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
                .then(function(response) {
                    if (response.ok || response.status !== 502) {
                        window.location.reload();
                    }
                })
                .catch(function() {});
        }, 3000);
    </script>
</body>
</html>
