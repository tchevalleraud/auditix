security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            stateless: false
            provider: app_user_provider
            entry_point: App\Security\AuthenticationEntryPoint
            json_login:
                check_path: api_login
                username_path: username
                password_path: password
            logout:
                path: api_logout
                target: /login

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/avatars, roles: PUBLIC_ACCESS }
        - { path: ^/api/logos, roles: PUBLIC_ACCESS }
        - { path: ^/api/contexts/\d+/users, roles: ROLE_USER }
        - { path: ^/api/manufacturers, roles: ROLE_USER }
        - { path: ^/api/models, roles: ROLE_USER }
        - { path: ^/api/nodes, roles: ROLE_USER }
        - { path: ^/api/profiles, roles: ROLE_USER }
        - { path: ^/api/snmp-credentials, roles: ROLE_USER }
        - { path: ^/api/cli-credentials, roles: ROLE_USER }
        - { path: ^/api/users$, methods: [GET], roles: ROLE_USER }
        - { path: ^/api/users, roles: ROLE_ADMIN }
        - { path: ^/api, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
